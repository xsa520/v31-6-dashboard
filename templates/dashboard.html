<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>📊 V31 策略監控面板</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: "Noto Sans TC", sans-serif; padding: 30px; background: #f0f0f0; color: #333; }
        h1 { font-size: 28px; }
        .time-box { margin-top: 10px; font-size: 16px; }
        canvas { background: white; padding: 20px; border-radius: 10px; }
        select { padding: 8px; font-size: 16px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1>📈 V31 策略監控系統</h1>
    <p>📅 最後更新時間：{{ status["last_update"] }}</p>
    <div class="time-box">🕒 美國華盛頓時間：<span id="usTime"></span></div>

    <hr>

    <label for="symbolSelector">選擇顯示股票資金變化圖：</label>
    <select id="symbolSelector">
        <option value="ALL">綜合</option>
        <option value="NVDA">NVDA</option>
        <option value="TSLA">TSLA</option>
        <option value="AAPL">AAPL</option>
        <option value="PLTR">PLTR</option>
        <option value="CELH">CELH</option>
        <option value="GOOG">GOOG</option>
        <option value="AMZN">AMZN</option>
        <option value="META">META</option>
        <option value="MSFT">MSFT</option>
        <option value="NFLX">NFLX</option>
    </select>

    <canvas id="capitalChart" width="800" height="400"></canvas>

    <script>
        // 動態顯示美國華盛頓時間
        function updateUSTime() {
            const now = new Date();
            const utc = now.getTime() + now.getTimezoneOffset() * 60000;
            const washingtonTime = new Date(utc - (4 * 60 * 60 * 1000)); // 美東時間
            document.getElementById("usTime").innerText = washingtonTime.toLocaleString();
        }
        setInterval(updateUSTime, 1000);
        updateUSTime();

        // 資料從後端 Jinja2 變數注入
        const rawData = {{ capital_data | tojson }};
        const selector = document.getElementById("symbolSelector");
        const ctx = document.getElementById("capitalChart").getContext("2d");

        let chart = null;

        function plotData(symbol) {
            let labels = [];
            let dataPoints = [];

            if (symbol === "ALL") {
                labels = rawData.map(item => item.date);
                dataPoints = rawData.map(item => item.total);
            } else {
                labels = rawData.map(item => item.date);
                dataPoints = rawData.map(item => item[symbol] || null);
            }

            if (chart) chart.destroy();

            chart = new Chart(ctx, {
                type: "line",
                data: {
                    labels: labels,
                    datasets: [{
                        label: symbol === "ALL" ? "綜合淨值" : `${symbol} 淨值`,
                        data: dataPoints,
                        borderColor: "blue",
                        backgroundColor: "rgba(0, 119, 204, 0.2)",
                        tension: 0.2
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        x: { title: { display: true, text: "日期" } },
                        y: { title: { display: true, text: "資金 (USD)" } }
                    }
                }
            });
        }

        selector.addEventListener("change", () => {
            plotData(selector.value);
        });

        plotData("ALL");
    </script>
</body>
</html>
