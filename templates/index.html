
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>V31.9 策略儀表板 Pro</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <h1>📊 V31.9 策略儀表板 Pro</h1>
    <div id="clock">🕒 載入中...</div>
    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById("clock").innerText = "🕒 現在時間：" + now.toLocaleString();
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
