<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>V31.9 Web Dashboard</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            margin: 20px;
        }
        h1 {
            color: #03dac6;
        }
        .section {
            margin-bottom: 40px;
        }
        #clock {
            font-size: 24px;
            font-weight: bold;
            color: #bb86fc;
        }
        .card {
            background-color: #1f1f1f;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
        }
    </style>
    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById("clock").textContent = now.toLocaleString('zh-TW');
        }
        setInterval(updateClock, 1000);
        window.onload = function() {
            updateClock();
            setInterval(() => location.reload(), 60000); // 每分鐘自動刷新
        }
    </script>
</head>
<body>
    <h1>⚙️ V31.9 智慧投資中控台</h1>
    <div class="section card">
        <div id="clock">載入中...</div>
    </div>

    <div class="section card">
        <h2>📊 系統狀態</h2>
        <ul>
            {% for item in v31_status %}
            <li>{{ item.date }}：策略狀態為「{{ item.status }}」｜當前資產：{{ item.total_capital }}</li>
            {% endfor %}
        </ul>
    </div>

    <div class="section card">
        <h2>📈 資金配置趨勢圖</h2>
        <div id="capitalTrendPlot"></div>
    </div>

    <div class="section card">
        <h2>🧠 AI 策略雷達（V31.9）</h2>
        <p>尚未啟動主動策略演算，待系統自動偵測後顯示最新評估結果。</p>
    </div>

    <script>
        const capitalTrend = {{ capital_trend | tojson }};
        const traces = [];

        for (const ticker in capitalTrend) {
            const data = capitalTrend[ticker];
            traces.push({
                x: data.map(d => d.date),
                y: data.map(d => d.value),
                mode: 'lines+markers',
                name: ticker
            });
        }

        Plotly.newPlot('capitalTrendPlot', traces, {
            title: '資金配置變化趨勢（最近10日）',
            paper_bgcolor: '#121212',
            plot_bgcolor: '#121212',
            font: { color: '#ffffff' },
            xaxis: { title: '日期' },
            yaxis: { title: '資金量（USD）' }
        });
    </script>
</body>
</html>
