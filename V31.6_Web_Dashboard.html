<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>V31.6 策略儀表板 Pro 版</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: 'Microsoft JhengHei', sans-serif; padding: 20px; background-color: #f7f7f7; }
    h1 { color: #2c3e50; }
    .section { margin-bottom: 30px; }
    .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
    .card-title { font-weight: bold; font-size: 18px; margin-bottom: 10px; }
    #chart-container { height: 300px; }
    .error { color: red; font-weight: bold; }
  </style>
</head>
<body>
  <h1>📊 V31.6 策略儀表板 Pro</h1>
  <div id="status" class="section card">讀取中...</div>
  <div id="trades" class="section card"></div>
  <div id="capital" class="section card"></div>
  <div id="reports" class="section card"></div>
  <div class="section card">
    <div class="card-title">資金淨值曲線</div>
    <div id="chart-container">
      <canvas id="capitalChart"></canvas>
    </div>
  </div>

  <script>
    async function fetchData() {
      try {
        const res1 = await fetch('v31_status.json');
        const data1 = await res1.json();

        const statusDiv = document.getElementById('status');
        const tradesDiv = document.getElementById('trades');
        const capitalDiv = document.getElementById('capital');
        const reportsDiv = document.getElementById('reports');

        statusDiv.innerHTML = `<b>狀態：</b>${data1.status}<br><b>最後更新：</b>${data1.last_update}`;

        if (data1.today_trades.length > 0) {
          tradesDiv.innerHTML = '<div class="card-title">今日交易</div>' + data1.today_trades.map(t =>
            `${t.time} | <b>${t.symbol}</b> ${t.action} ${t.quantity} 股 @ $${t.price}`).join('<br>');
        } else {
          tradesDiv.innerHTML = '<div class="card-title">今日交易</div>今日尚無交易記錄。';
        }

        capitalDiv.innerHTML = `
          <div class="card-title">資金狀態</div>
          初始資金：$${data1.capital.initial}<br>
          當前資金：$${data1.capital.current}<br>
          損益：$${data1.capital.profit}（${data1.capital.profit_rate}）
        `;

        reportsDiv.innerHTML = `
          <div class="card-title">報表摘要</div>
          🗓 日報：${data1.report.daily.date}｜交易次數 ${data1.report.daily.trade_count}<br>
          📅 週報：${data1.report.weekly.week}｜交易次數 ${data1.report.weekly.trade_count}<br>
          📆 月報：${data1.report.monthly.month}｜交易次數 ${data1.report.monthly.trade_count}
        `;

      } catch (e) {
        document.getElementById('status').innerHTML = '<div class="error">❌ 無法載入狀態資料。請確認 v31_status.json 是否與本頁面同目錄。</div>';
      }

      try {
        const res2 = await fetch('capital_trend.json');
        const data2 = await res2.json();
        const ctx = document.getElementById('capitalChart').getContext('2d');
        new Chart(ctx, {
          type: 'line',
          data: {
            labels: data2.date,
            datasets: [{
              label: '資金變化',
              data: data2.capital,
              borderColor: '#27ae60',
              fill: false,
              tension: 0.2
            }]
          },
          options: {
            responsive: true,
            scales: { y: { beginAtZero: false } }
          }
        });
      } catch (e) {
        console.error('曲線讀取錯誤', e);
      }
    }

    fetchData();
  </script>
</body>
</html>
